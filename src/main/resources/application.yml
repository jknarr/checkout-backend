server:
  port: 443
  ssl:
    certificate: "file:certs/auth.demo.com.pem"
    certificate-private-key: "file:certs/auth.demo.com-key.pem"

spring:
  application:
    name: checkout-backend
  datasource:
    url: jdbc:h2:file:./data/checkoutdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true

demo:
  cors:
    allowed-origins: "http://localhost:5173,https://merchant.local:5173,https://another-merchant.local:5174"
  session:
    expiry-minutes: 30
  otp:
    expiry-minutes: 10
    mock-mode: true
  jwt:
    secret: "demo-dev-secret-change-in-prod-must-be-256-bits-long-abcdefghijklmno"
    expiry-minutes: 60
  device:
    challenge-expiry-seconds: 300
  passkey:
    rp-id: "auth.demo.com"
    rp-name: "Demo Checkout"
    origin: "https://auth.demo.com"
    challenge-ttl-seconds: 120

logging:
  level:
    com.demo.checkout: DEBUG
